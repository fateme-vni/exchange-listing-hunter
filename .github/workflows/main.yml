name: Run Exchange Listing Hunter

on:
  schedule:
    - cron: '*/30 * * * *'  # هر ۳۰ دقیقه یک‌بار صرافی‌ها را شخم می‌زند
  workflow_dispatch:      # قابلیت اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot google-genai

    - name: Run Bot Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python bot_ai.py

    - name: Commit and Push History
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add sent_tweets_ai.txt || true
        git commit -m "Update listing history [skip ci]" || echo "No changes to commit"
        git push || echo "No changes to push"
